<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Calendar</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f6f8fa;
            --border: #d1d9e0;
            --border-light: #e8ecf0;
            --text: #1f2328;
            --text-secondary: #656d76;
            --text-tertiary: #8b949e;
            --green-0: #ebedf0;
            --green-1: #9be9a8;
            --green-2: #40c463;
            --green-3: #30a14e;
            --green-4: #216e39;
            --accent: #1a7f37;
            --hour-w: 6px;
            --hour-h: 18px;
            --gap: 1px;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }

        /* Header */
        header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-eyebrow {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1.25;
        }

            h1 span {
                color: var(--accent);
            }

        .subtitle {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Loading indicator */
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 48px 0;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--text-tertiary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-error {
            padding: 48px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }

            .loading-error code {
                font-family: var(--font-mono);
                font-size: 12px;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 2px 6px;
            }

        /* Time axis */
        .time-axis-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            padding-left: 108px;
        }

        .time-label {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-tertiary);
            letter-spacing: 0.02em;
            width: 0;
            white-space: nowrap;
            overflow: visible;
            display: inline-block;
        }

        .time-spacer {
            display: inline-block;
        }

        /* Scroll wrapper for bins on small screens */
        .calendar-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .calendar-inner {
            min-width: fit-content;
        }

        /* Week group */
        .week-group {
            margin-bottom: 20px;
        }

        .week-header {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
            padding-left: 108px;
            padding-top: 10px;
            border-top: 1px solid var(--border-light);
        }

        .week-group:first-child .week-header {
            border-top: none;
            padding-top: 0;
        }

        /* Day row */
        .day-row {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }

            .day-row:hover {
                background: var(--bg-secondary);
                border-radius: 4px;
            }

        .day-label {
            width: 108px;
            flex-shrink: 0;
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding-left: 6px;
        }

        .day-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text);
            width: 28px;
        }

        .day-date {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-tertiary);
        }

            .day-date .day-num {
                color: var(--text-secondary);
            }

        /* Bins container */
        .bins {
            display: flex;
            gap: var(--gap);
            align-items: center;
        }

        /* Hour group (4 bins) */
        .hour-group {
            display: flex;
            gap: var(--gap);
        }

            .hour-group + .hour-group {
                margin-left: 2px;
            }

        /* Individual bin */
        .bin {
            width: var(--hour-w);
            height: var(--hour-h);
            border-radius: 1px;
            flex-shrink: 0;
            transition: transform 0.1s ease;
            cursor: default;
            position: relative;
        }

            .bin:hover {
                transform: scaleY(1.4);
                z-index: 10;
            }

            .bin[data-active="0"] {
                background: var(--green-0);
            }

            .bin[data-active="1"] {
                background: var(--green-3);
            }

            /* Work-hours boundary markers (weekdays 9–5) */
            .bin[data-work-start] {
                box-shadow: -2px 0 0 0 var(--text);
            }

            .bin[data-work-end] {
                box-shadow: 2px 0 0 0 var(--text);
            }

            /* Tooltip */
            .bin::after {
                content: attr(data-tip);
                position: absolute;
                bottom: calc(100% + 8px);
                left: 50%;
                transform: translateX(-50%);
                background: var(--text);
                color: var(--bg);
                font-family: var(--font-mono);
                font-size: 10px;
                white-space: nowrap;
                padding: 3px 7px;
                border-radius: 5px;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.12s;
                z-index: 100;
            }

            .bin::before {
                content: '';
                position: absolute;
                bottom: calc(100% + 4px);
                left: 50%;
                transform: translateX(-50%);
                border: 4px solid transparent;
                border-top-color: var(--text);
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.12s;
                z-index: 100;
            }

            .bin:hover::after,
            .bin:hover::before {
                opacity: 1;
            }

        /* Activity count */
        .day-count {
            margin-left: 8px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-tertiary);
            min-width: 44px;
        }

            .day-count span {
                color: var(--accent);
                font-weight: 600;
            }

        /* Legend */
        .legend {
            margin-top: 28px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .legend-bins {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .legend-bin {
            width: 8px;
            height: 8px;
            border-radius: 1px;
        }

            .legend-bin.off {
                background: var(--green-0);
            }

            .legend-bin.on {
                background: var(--green-3);
            }

        /* Stats */
        .stats-bar {
            margin-top: 20px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

            .stats-bar > div {
                font-size: 11px;
                color: var(--text-secondary);
            }

        .stat-val {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            display: block;
            line-height: 1.3;
        }

        /* Footer section hidden until data loads */
        .calendar-footer {
            display: none;
        }

            .calendar-footer.visible {
                display: block;
            }

        /* Responsive */
        @media (max-width: 640px) {
            .page {
                padding: 20px 12px 48px;
            }

            h1 {
                font-size: 22px;
            }

            .time-axis-row {
                padding-left: 72px;
            }

            .day-label {
                width: 72px;
                padding-left: 4px;
            }

            .day-date {
                display: none;
            }

            .day-count {
                display: none;
            }

            .week-header {
                padding-left: 72px;
                font-size: 10px;
            }

            .stats-bar {
                gap: 20px;
                padding: 14px 16px;
            }

            .stat-val {
                font-size: 18px;
            }
        }

        @media (max-width: 420px) {
            :root {
                --hour-w: 4px;
                --hour-h: 14px;
            }

            .page {
                padding: 16px 8px 40px;
            }

            h1 {
                font-size: 20px;
            }

            .time-axis-row {
                padding-left: 52px;
            }

            .day-label {
                width: 52px;
            }

            .day-name {
                font-size: 10px;
                width: 24px;
            }

            .week-header {
                padding-left: 52px;
            }

            .hour-group + .hour-group {
                margin-left: 1px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <div class="header-eyebrow">15-min resolution · 96 bins/day</div>
            <h1>Activity <span>Log</span></h1>
            <div class="subtitle" id="subtitle">Loading activity data…</div>
        </header>

        <div class="calendar-scroll">
            <div class="calendar-inner" id="calendar">
                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    Fetching activity data…
                </div>
            </div>
        </div>

        <div class="calendar-footer" id="footer">
            <div class="legend">
                <span>Less</span>
                <div class="legend-bins">
                    <div class="legend-bin off"></div>
                    <div class="legend-bin on"></div>
                </div>
                <span>More</span>
                <span style="margin-left: 8px; border-left: 1px solid var(--border); padding-left: 12px;">Each square = 15 min</span>
            </div>

            <div class="stats-bar" id="stats"></div>
        </div>
    </div>

    <script>
        const DATA_URL = 'https://swharden.com/activity/test/data/';
        const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function hexToBits(hex) {
            const bits = [];
            for (let i = 0; i < hex.length; i += 2) {
                const byte = parseInt(hex.slice(i, i + 2), 16);
                for (let b = 0; b < 8; b++) {
                    bits.push((byte >> b) & 1);
                }
            }
            return bits;
        }

        function formatTime(binIndex) {
            const totalMins = binIndex * 15;
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            const ampm = h < 12 ? 'AM' : 'PM';
            const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
            return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
        }

        function formatHour(binIndex) {
            const h = Math.floor(binIndex * 15 / 60);
            if (h === 0) return '12a';
            if (h === 12) return '12p';
            if (h < 12) return `${h}a`;
            return `${h - 12}p`;
        }

        function getWeekKey(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            const day = d.getDay();
            const diff = (day === 0) ? -6 : 1 - day;
            const mon = new Date(d);
            mon.setDate(d.getDate() + diff);
            return mon.toISOString().slice(0, 10);
        }

        function formatDateRange(data) {
            const first = new Date(data[0].date + 'T12:00:00');
            const last = new Date(data[data.length - 1].date + 'T12:00:00');
            const fmt = d => `${MONTH_NAMES[d.getMonth()]} ${String(d.getDate()).padStart(2, '0')}, ${d.getFullYear()}`;
            return `${fmt(first)} – ${fmt(last)}`;
        }

        function render(data) {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            // Update subtitle with actual date range
            document.getElementById('subtitle').textContent =
                `${formatDateRange(data)} · ${data.length} days · daily activity bins`;

            // Read CSS variable values for JS layout calculations
            const rootStyle = getComputedStyle(document.documentElement);
            const BIN_W = parseInt(rootStyle.getPropertyValue('--hour-w'));
            const BIN_GAP = parseInt(rootStyle.getPropertyValue('--gap'));
            const GROUP_MARGIN = 2;

            // Group days by week
            const weeks = new Map();
            data.forEach(entry => {
                const wk = getWeekKey(entry.date);
                if (!weeks.has(wk)) weeks.set(wk, []);
                weeks.get(wk).push(entry);
            });

            // Time axis header
            const axisRow = document.createElement('div');
            axisRow.className = 'time-axis-row';
            let axisHTML = '';
            const groupW = 4 * BIN_W + 3 * BIN_GAP;
            for (let g = 0; g < 24; g++) {
                const marginL = g > 0 ? `${GROUP_MARGIN}px` : '0';
                if (g % 4 === 0) {
                    axisHTML += `<div class="time-label" style="width:${groupW}px;margin-left:${marginL}">${formatHour(g * 4)}</div>`;
                } else {
                    axisHTML += `<div class="time-spacer" style="display:inline-block;width:${groupW}px;margin-left:${marginL}"></div>`;
                }
            }
            axisRow.innerHTML = axisHTML;
            cal.appendChild(axisRow);

            let totalActive = 0;
            let totalBins = 0;

            weeks.forEach((entries, weekKey) => {
                const wkDate = new Date(weekKey + 'T12:00:00');

                const weekDiv = document.createElement('div');
                weekDiv.className = 'week-group';

                const wkLabel = `Week of ${MONTH_NAMES[wkDate.getMonth()]} ${wkDate.getDate()}`;
                weekDiv.innerHTML = `<div class="week-header">${wkLabel}</div>`;

                entries.forEach(entry => {
                    const d = new Date(entry.date + 'T12:00:00');
                    const dayOfWeek = d.getDay();
                    const isWeekday = dayOfWeek >= 1 && dayOfWeek <= 5;
                    const bits = hexToBits(entry.hex);
                    const activeCount = bits.filter(b => b === 1).length;
                    totalActive += activeCount;
                    totalBins += 96;

                    const dayRow = document.createElement('div');
                    dayRow.className = 'day-row';

                    const dayLabel = document.createElement('div');
                    dayLabel.className = 'day-label';
                    dayLabel.innerHTML = `
                            <div class="day-name">${DAY_NAMES[d.getDay()]}</div>
                            <div class="day-date">${MONTH_NAMES[d.getMonth()]} <span class="day-num">${d.getDate()}</span></div>
                        `;
                    dayRow.appendChild(dayLabel);

                    const binsDiv = document.createElement('div');
                    binsDiv.className = 'bins';

                    for (let h = 0; h < 24; h++) {
                        const hGroup = document.createElement('div');
                        hGroup.className = 'hour-group';
                        for (let q = 0; q < 4; q++) {
                            const idx = h * 4 + q;
                            const active = bits[idx];
                            const bin = document.createElement('div');
                            bin.className = 'bin';
                            bin.dataset.active = active;
                            if (isWeekday && h === 9 && q === 0) bin.dataset.workStart = '';
                            if (isWeekday && h === 16 && q === 3) bin.dataset.workEnd = '';
                            bin.dataset.tip = `${formatTime(idx)}–${formatTime(idx + 1)} · ${active ? 'Active' : 'Inactive'}`;
                            hGroup.appendChild(bin);
                        }
                        binsDiv.appendChild(hGroup);
                    }

                    dayRow.appendChild(binsDiv);

                    const countDiv = document.createElement('div');
                    countDiv.className = 'day-count';
                    const hrs = Math.floor(activeCount * 15 / 60);
                    const mins = (activeCount * 15) % 60;
                    countDiv.innerHTML = `<span>${hrs}h${mins ? mins + 'm' : ''}</span>`;
                    dayRow.appendChild(countDiv);

                    weekDiv.appendChild(dayRow);
                });

                cal.appendChild(weekDiv);
            });

            // Stats
            const totalHrs = Math.floor(totalActive * 15 / 60);
            const totalMins = (totalActive * 15) % 60;
            const pct = Math.round(totalActive / totalBins * 100);
            document.getElementById('stats').innerHTML = `
                    <div><span class="stat-val">${totalHrs}h ${totalMins}m</span>Total active time</div>
                    <div><span class="stat-val">${pct}%</span>Of tracked period</div>
                    <div><span class="stat-val">${data.length}</span>Days recorded</div>
                `;

            // Show footer
            document.getElementById('footer').classList.add('visible');
        }

        // Fetch and render
        fetch(DATA_URL)
            .then(res => {
                if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
                return res.json();
            })
            .then(data => render(data))
            .catch(err => {
                document.getElementById('calendar').innerHTML =
                    `<div class="loading-error">Unable to load activity data. <code>${err.message}</code></div>`;
            });
    </script>
</body>

</html>
