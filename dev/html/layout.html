<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Calendar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f0d;
            --surface: #111914;
            --border: #1e2e22;
            --text-dim: #3d5c45;
            --text-mid: #6b9475;
            --text: #c8e6d0;
            --text-bright: #e8f5eb;
            --green-0: #0a0f0d;
            --green-1: #143d1e;
            --green-2: #1a6b30;
            --green-3: #22a845;
            --green-4: #2ecc5a;
            --accent: #39ff82;
            --hour-w: 10px;
            --hour-h: 28px;
            --gap: 2px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            padding: 48px 40px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(46, 204, 90, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 52px;
        }

        .header-eyebrow {
            font-size: 10px;
            letter-spacing: 0.25em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(28px, 4vw, 48px);
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.03em;
            line-height: 1;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-mid);
            letter-spacing: 0.05em;
        }

        /* Time axis */
        .time-axis-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            padding-left: 156px;
        }

        .time-label {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            width: 0;
            white-space: nowrap;
            overflow: visible;
            display: inline-block;
        }

        .time-spacer {
            display: inline-block;
        }

        /* Week group */
        .week-group {
            margin-bottom: 32px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .week-group:nth-child(1) {
            animation-delay: 0.05s;
        }

        .week-group:nth-child(2) {
            animation-delay: 0.15s;
        }

        .week-group:nth-child(3) {
            animation-delay: 0.25s;
        }

        .week-header {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-left: 156px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        /* Day row */
        .day-row {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .day-label {
            width: 156px;
            flex-shrink: 0;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .day-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            width: 32px;
        }

        .day-date {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        .day-date .day-num {
            color: var(--text-mid);
        }

        /* Bins container */
        .bins {
            display: flex;
            gap: var(--gap);
            align-items: center;
        }

        /* Hour group (4 bins) with subtle separator every 4 hours */
        .hour-group {
            display: flex;
            gap: var(--gap);
        }

        .hour-group+.hour-group {
            margin-left: 4px;
        }

        /* Individual bin */
        .bin {
            width: var(--hour-w);
            height: var(--hour-h);
            border-radius: 2px;
            flex-shrink: 0;
            transition: transform 0.1s ease, filter 0.1s ease;
            cursor: default;
            position: relative;
        }

        .bin:hover {
            transform: scaleY(1.25);
            filter: brightness(1.4);
            z-index: 10;
        }

        .bin[data-active="0"] {
            background: var(--green-0);
            border: 1px solid var(--border);
        }

        .bin[data-active="1"] {
            background: var(--green-3);
            box-shadow: 0 0 6px rgba(34, 168, 69, 0.4);
        }

        /* Tooltip */
        .bin::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a2e1e;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 9px;
            white-space: nowrap;
            padding: 3px 7px;
            border-radius: 3px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 100;
        }

        .bin:hover::after {
            opacity: 1;
        }

        /* Activity count */
        .day-count {
            margin-left: 12px;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            min-width: 40px;
        }

        .day-count span {
            color: var(--green-3);
        }

        /* Legend */
        .legend {
            margin-top: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--text-dim);
        }

        .legend-bins {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .legend-bin {
            width: 10px;
            height: 16px;
            border-radius: 2px;
        }

        .legend-bin.off {
            background: var(--green-0);
            border: 1px solid var(--border);
        }

        .legend-bin.on {
            background: var(--green-3);
        }

        .stats-bar {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 32px;
            font-size: 10px;
            color: var(--text-dim);
        }

        .stat-val {
            font-size: 18px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--accent);
            display: block;
            line-height: 1.2;
        }
    </style>
</head>

<body>

        <header>
            <div class="header-eyebrow">15-min resolution · 96 bins/day</div>

            inactive &nbsp;/&nbsp; active &nbsp;·&nbsp; each square = 15 min

        <div class="stats-bar" id="stats"></div>

        const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function hexToBits(hex) {
            // Each hex char → 4 bits, total 24 chars → 96 bits
            // Bits are LSB-first within each byte
            const bits = [];
            for (let i = 0; i < hex.length; i += 2) {
                const byte = parseInt(hex.slice(i, i + 2), 16);
                for (let b = 0; b < 8; b++) {
                    bits.push((byte >> b) & 1);
                }
            }
            return bits; // 96 bits, bin 0 = midnight
        }

        function formatTime(binIndex) {
            const totalMins = binIndex * 15;
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            const ampm = h < 12 ? 'AM' : 'PM';
            const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
            return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
        }

        function formatHour(binIndex) {
            const h = Math.floor(binIndex * 15 / 60);
            if (h === 0) return '12a';
            if (h === 12) return '12p';
            if (h < 12) return `${h}a`;
            return `${h - 12}p`;
        }

        // Group days by week (Mon–Sun)
        function getWeekKey(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            const day = d.getDay(); // 0=Sun
            // Week starts Monday
            const diff = (day === 0) ? -6 : 1 - day;
            const mon = new Date(d);
            mon.setDate(d.getDate() + diff);
            return mon.toISOString().slice(0, 10);
        }

        // Build weeks map
        const weeks = new Map();
        DATA.forEach(entry => {
            const wk = getWeekKey(entry.date);
            if (!weeks.has(wk)) weeks.set(wk, []);
            weeks.get(wk).push(entry);
        });

        // Time axis
        const cal = document.getElementById('calendar');

        // Time axis header
        const axisRow = document.createElement('div');
        axisRow.className = 'time-axis-row';

        // 24 hours, each hour = 4 bins at (10+2)px each + 4px group margin
        // We'll place labels at every 4 hours
        let axisHTML = '';
        for (let g = 0; g < 24; g++) {
            const marginL = g > 0 ? '4px' : '0';
            // each group = 4 bins * 12px + 3 gaps * 2px = 48+6 = 54px  
            const groupW = 4 * 10 + 3 * 2; // 46px
            if (g % 4 === 0) {
                axisHTML += `<div class="time-label" style="width:${groupW}px;margin-left:${marginL}">${formatHour(g * 4)}</div>`;
            } else {
                axisHTML += `<div class="time-spacer" style="display:inline-block;width:${groupW}px;margin-left:${marginL}"></div>`;
            }
        }
        axisRow.innerHTML = axisHTML;
        cal.appendChild(axisRow);

        let totalActive = 0;
        let totalBins = 0;

        weeks.forEach((entries, weekKey) => {
            const wkDate = new Date(weekKey + 'T12:00:00');
            const wkEnd = new Date(wkDate);
            wkEnd.setDate(wkDate.getDate() + 6);

            const weekDiv = document.createElement('div');
            weekDiv.className = 'week-group';

            const wkLabel = `Week of ${MONTH_NAMES[wkDate.getMonth()]} ${wkDate.getDate()}`;
            weekDiv.innerHTML = `<div class="week-header">${wkLabel}</div>`;

            entries.forEach(entry => {
                const d = new Date(entry.date + 'T12:00:00');
                const bits = hexToBits(entry.hex);
                const activeCount = bits.filter(b => b === 1).length;
                totalActive += activeCount;
                totalBins += 96;

                const dayRow = document.createElement('div');
                dayRow.className = 'day-row';

                const dayLabel = document.createElement('div');
                dayLabel.className = 'day-label';
                dayLabel.innerHTML = `
      <div class="day-name">${DAY_NAMES[d.getDay()]}</div>
      <div class="day-date">${MONTH_NAMES[d.getMonth()]} <span class="day-num">${d.getDate()}</span></div>
    `;
                dayRow.appendChild(dayLabel);

                const binsDiv = document.createElement('div');
                binsDiv.className = 'bins';

                // Group into 24 hour-groups of 4 bins each
                for (let h = 0; h < 24; h++) {
                    const hGroup = document.createElement('div');
                    hGroup.className = 'hour-group';
                    for (let q = 0; q < 4; q++) {
                        const idx = h * 4 + q;
                        const active = bits[idx];
                        const bin = document.createElement('div');
                        bin.className = 'bin';
                        bin.dataset.active = active;
                        bin.dataset.tip = `${formatTime(idx)}–${formatTime(idx + 1)} · ${active ? '●' : '○'}`;
                        hGroup.appendChild(bin);
                    }
                    binsDiv.appendChild(hGroup);
                }

                dayRow.appendChild(binsDiv);

                const countDiv = document.createElement('div');
                countDiv.className = 'day-count';
                const hrs = Math.floor(activeCount * 15 / 60);
                const mins = (activeCount * 15) % 60;
                countDiv.innerHTML = `<span>${hrs}h${mins ? mins + 'm' : ''}</span>`;
                dayRow.appendChild(countDiv);

                weekDiv.appendChild(dayRow);
            });

            cal.appendChild(weekDiv);
        });

        // Stats
        const totalHrs = Math.floor(totalActive * 15 / 60);
        const totalMins = (totalActive * 15) % 60;
        const pct = Math.round(totalActive / totalBins * 100);
        document.getElementById('stats').innerHTML = `
  <div><span class="stat-val">${totalHrs}h ${totalMins}m</span>total active time</div>
  <div><span class="stat-val">${pct}%</span>of tracked period</div>
  <div><span class="stat-val">${DATA.length}</span>days recorded</div>
`;
    </script>
</body>

</html>
